<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>עירוני | מבט נקי על ערי ישראל</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>

    <main class="layout">
      <header class="hero">
        <p class="brand">עירוני</p>
        <h1>נתונים, בלי רעש</h1>
        <p class="subtitle">
          תצוגה מדויקת של נתוני למ"ס לכל עיר בישראל, עם היסטוריה והשוואה חכמה.
        </p>
      </header>

      <section class="controls panel">
        <div class="field-row">
          <div class="field">
            <label for="city-search">חיפוש עיר</label>
            <input id="city-search" type="text" placeholder="לדוגמה: חיפה" autocomplete="off" />
          </div>

          <div class="field">
            <label for="city-select">עיר ראשית</label>
            <select id="city-select"></select>
          </div>

          <div class="field">
            <label for="compare-city-select">השוואה לעיר נוספת</label>
            <select id="compare-city-select">
              <option value="">ללא השוואה</option>
            </select>
          </div>
        </div>

        <p class="meta">
          שנת נתונים: <span id="data-year">-</span>
          <span class="sep">•</span>
          מקור: <span id="data-source">-</span>
        </p>
      </section>

      <section class="kpi-grid" id="kpi-grid"></section>

      <section class="panel details">
        <h2>פרופיל עיר</h2>
        <p id="city-description"></p>
      </section>

      <section class="panel chart-area">
        <h2>השוואת אוכלוסייה בין ערים מובילות</h2>
        <div id="population-chart" class="bar-chart"></div>
      </section>

      <section class="panel chart-area">
        <h2>אוכלוסייה לאורך זמן (2018-2023)</h2>
        <div id="history-population-chart" class="history-bars"></div>
      </section>

      <section class="panel chart-area">
        <h2>שינוי שנתי באוכלוסייה</h2>
        <div id="history-delta-chart" class="history-line-wrap">
          <svg id="history-delta-svg" class="history-line-svg" viewBox="0 0 640 210" preserveAspectRatio="none"></svg>
          <div id="history-delta-labels" class="history-line-labels"></div>
        </div>
      </section>

      <section class="panel chart-area">
        <h2>דירוג אוכלוסייה ארצי לאורך זמן</h2>
        <div class="history-line-wrap">
          <div id="history-rank-legend" class="history-rank-legend"></div>
          <svg id="history-rank-svg" class="history-line-svg" viewBox="0 0 640 210" preserveAspectRatio="none"></svg>
          <div id="history-rank-labels" class="history-line-labels"></div>
        </div>
      </section>
    </main>

    <template id="kpi-template">
      <article class="kpi panel">
        <p class="kpi-label"></p>
        <p class="kpi-value"></p>
        <p class="kpi-note"></p>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
